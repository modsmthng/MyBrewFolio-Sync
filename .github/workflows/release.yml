name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    if: github.repository == 'modsmthng/MyBrewFolio-Sync'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            args: '--bundles appimage,deb'
          - os: windows-latest
            args: '--bundles msi'
          - os: macos-latest
            args: '--target universal-apple-darwin --bundles dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Verify release configuration
        shell: bash
        env:
          OAUTH_CLIENT_ID: ${{ vars.MYBREWFOLIO_SYNC_OAUTH_CLIENT_ID }}
          UPDATER_PUBLIC_KEY: ${{ vars.MYBREWFOLIO_SYNC_UPDATER_PUBLIC_KEY }}
          UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -n "$OAUTH_CLIENT_ID" || { echo 'Missing MYBREWFOLIO_SYNC_OAUTH_CLIENT_ID repository variable'; exit 1; }
          test -n "$UPDATER_PUBLIC_KEY" || { echo 'Missing MYBREWFOLIO_SYNC_UPDATER_PUBLIC_KEY repository variable'; exit 1; }
          test -n "$UPDATER_PRIVATE_KEY" || { echo 'Missing TAURI_SIGNING_PRIVATE_KEY repository secret'; exit 1; }
          test -n "$UPDATER_PRIVATE_KEY_PASSWORD" || { echo 'Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD repository secret'; exit 1; }
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MYBREWFOLIO_SYNC_OAUTH_CLIENT_ID: ${{ vars.MYBREWFOLIO_SYNC_OAUTH_CLIENT_ID }}
          MYBREWFOLIO_SYNC_UPDATER_PUBLIC_KEY: ${{ vars.MYBREWFOLIO_SYNC_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'MyBrewFolio Sync __VERSION__'
          releaseBody: 'Experimental MyBrewFolio Sync companion. Review the generated installers and signatures before publishing this draft.'
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}
      - name: Build unsigned Microsoft Store submission package
        if: matrix.os == 'windows-latest' && vars.MYBREWFOLIO_MSIX_IDENTITY_NAME != '' && vars.MYBREWFOLIO_MSIX_PUBLISHER != ''
        shell: pwsh
        run: |
          $parts = '${{ github.ref_name }}'.Replace('v', '').Split('.')
          if ($parts.Count -ne 3) { throw 'The release tag must use vMAJOR.MINOR.PATCH' }
          $packageVersion = "$($parts[0]).$($parts[1]).$($parts[2]).0"
          ./scripts/package-msix.ps1 `
            -IdentityName '${{ vars.MYBREWFOLIO_MSIX_IDENTITY_NAME }}' `
            -Publisher '${{ vars.MYBREWFOLIO_MSIX_PUBLISHER }}' `
            -Version $packageVersion `
            -Executable './src-tauri/target/release/mybrewfolio-sync.exe' `
            -Output './MyBrewFolio-Sync-Store.msix'
          gh release upload '${{ github.ref_name }}' './MyBrewFolio-Sync-Store.msix' --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
